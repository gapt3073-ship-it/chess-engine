<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f; --surface: #181818; --surface2: #222;
    --border: #2a2a2a; --accent: #c9a84c; --accent2: #8b6914;
    --light-sq: #f0d9b5; --dark-sq: #b58863;
    --text: #e8e8e8; --text-dim: #888;
    --win: #4caf82; --lose: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }

  /* Color Screen */
  #color-screen { display:flex; flex-direction:column; align-items:center; gap:48px; animation:fadeIn .6s ease; }
  #color-screen h1 { font-family:'Playfair Display',serif; font-size:3rem; color:var(--accent); letter-spacing:.05em; }
  .color-options { display:flex; gap:24px; }
  .color-btn {
    width:140px; height:160px; border:1px solid var(--border); background:var(--surface);
    cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; transition:all .2s; position:relative; overflow:hidden;
  }
  .color-btn::before { content:''; position:absolute; inset:0; background:var(--accent); opacity:0; transition:opacity .2s; }
  .color-btn:hover::before { opacity:.07; }
  .color-btn:hover { border-color:var(--accent); transform:translateY(-2px); }
  .color-btn svg { width:56px; height:56px; position:relative; z-index:1; }
  .color-btn .label { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); position:relative; z-index:1; }

  /* Game Screen */
  #game-screen { display:none; gap:20px; align-items:flex-start; animation:fadeIn .4s ease; }

  /* Eval Bar */
  .eval-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .eval-bar { width:18px; height:480px; background:var(--lose); border-radius:3px; overflow:hidden; position:relative; border:1px solid var(--border); }
  .eval-fill { position:absolute; bottom:0; width:100%; background:#f0f0f0; transition:height .6s cubic-bezier(.4,0,.2,1); height:50%; }
  .eval-label { font-size:.65rem; color:var(--text-dim); }
  .eval-score { font-size:.75rem; color:var(--accent); font-weight:500; }

  /* Board */
  .board-area { display:flex; flex-direction:column; }
  .rank-labels { display:flex; flex-direction:column; justify-content:space-around; height:480px; padding:0 6px; }
  .rank-labels span,.file-labels span { font-size:.6rem; color:var(--text-dim); }
  .file-labels { display:flex; justify-content:space-around; padding:4px 0 0; width:480px; }
  .board-row-wrap { display:flex; align-items:center; }
  #board { display:grid; grid-template-columns:repeat(8,60px); grid-template-rows:repeat(8,60px); border:2px solid var(--border); width:480px; height:480px; user-select:none; }
  .sq { width:60px; height:60px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
  .sq.light { background:var(--light-sq); }
  .sq.dark  { background:var(--dark-sq); }
  .sq.selected { outline:3px solid var(--accent); outline-offset:-3px; background:rgba(255,215,0,.38) !important; }
  .sq.last-move { background:rgba(255,215,0,.28) !important; }
  .sq.in-check  { background:rgba(220,50,50,.6) !important; }
  .legal-dot { width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.2); pointer-events:none; }
  .legal-capture { position:absolute; inset:0; border:5px solid rgba(0,0,0,.2); pointer-events:none; }
  .sq img { width:54px; height:54px; pointer-events:none; display:block; }

  /* Right Panel */
  .right-panel { width:220px; display:flex; flex-direction:column; gap:12px; height:480px; }
  .panel-box { background:var(--surface); border:1px solid var(--border); padding:12px; }
  .panel-title { font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; font-weight:500; }
  .move-log-box { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  #move-log { flex:1; overflow-y:auto; font-size:.72rem; line-height:1.8; color:var(--text-dim); scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  #move-log::-webkit-scrollbar { width:4px; }
  #move-log::-webkit-scrollbar-thumb { background:var(--border); }
  .log-row { display:flex; gap:4px; }
  .log-num { color:var(--border); width:22px; flex-shrink:0; }
  .log-w   { color:var(--text); width:60px; }
  .log-b   { color:var(--text-dim); width:60px; }

  .ctrl-row { display:flex; gap:8px; margin-bottom:8px; }
  .btn {
    flex:1; padding:8px 6px; border:1px solid var(--border); background:var(--surface2);
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.65rem;
    letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .15s;
  }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn.danger:hover { border-color:var(--lose); color:var(--lose); }

  .toggle-row { display:flex; align-items:center; justify-content:space-between; font-size:.65rem; color:var(--text-dim); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; }
  .toggle { width:36px; height:18px; background:var(--border); border-radius:9px; position:relative; cursor:pointer; transition:background .2s; }
  .toggle.on { background:var(--accent); }
  .toggle::after { content:''; position:absolute; width:14px; height:14px; background:white; border-radius:50%; top:2px; left:2px; transition:left .2s; }
  .toggle.on::after { left:20px; }

  .depth-row { display:flex; align-items:center; justify-content:space-between; font-size:.65rem; color:var(--text-dim); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .depth-val { color:var(--accent); font-weight:500; }
  input[type=range] { -webkit-appearance:none; width:100%; height:3px; background:var(--border); border-radius:2px; outline:none; margin:4px 0 10px; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer; }

  #status { font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; min-height:16px; }
  #status.thinking { color:var(--accent); }
  #status.check    { color:var(--lose); }
  #status.gameover { color:var(--win); }

  /* Promo modal */
  #promo-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100; align-items:center; justify-content:center; }
  #promo-modal.show { display:flex; }
  .promo-box { background:var(--surface); border:1px solid var(--accent); padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .promo-box p { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); }
  .promo-pieces { display:flex; gap:8px; }
  .promo-piece { width:68px; height:68px; cursor:pointer; border:1px solid var(--border); padding:6px; display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--surface2); }
  .promo-piece:hover { border-color:var(--accent); }
  .promo-piece img { width:52px; height:52px; display:block; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .thinking-dots::after { content:''; animation:dots 1.2s steps(3,end) infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
</style>
</head>
<body>

<div id="color-screen">
  <div style="text-align:center">
    <h1>Chess</h1>
    <p style="margin-top:8px;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)">Choose your side</p>
  </div>
  <div class="color-options">
    <div class="color-btn" onclick="startGame('w')">
      <img id="sel-wK" style="width:56px;height:56px">
      <span class="label">White</span>
    </div>
    <div class="color-btn" onclick="startGame('b')">
      <img id="sel-bK" style="width:56px;height:56px">
      <span class="label">Black</span>
    </div>
  </div>
</div>

<div id="game-screen">
  <div class="eval-bar-wrap">
    <span class="eval-label">W</span>
    <div class="eval-bar"><div class="eval-fill" id="eval-fill"></div></div>
    <span class="eval-label">B</span>
    <span class="eval-score" id="eval-score">0.00</span>
  </div>

  <div class="board-area">
    <div id="status"></div>
    <div style="height:6px"></div>
    <div class="board-row-wrap">
      <div class="rank-labels" id="rank-labels"></div>
      <div id="board"></div>
    </div>
    <div class="file-labels" id="file-labels"></div>
  </div>

  <div class="right-panel">
    <div class="panel-box move-log-box">
      <div class="panel-title">Move Log</div>
      <div id="move-log"></div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Controls</div>
      <div class="toggle-row">
        <span>Allow Undo</span>
        <div class="toggle on" id="undo-toggle" onclick="toggleUndo()"></div>
      </div>
      <div class="depth-row"><span>Depth</span><span class="depth-val" id="depth-val">6</span></div>
      <input type="range" id="depth-slider" min="1" max="8" value="6"
             oninput="document.getElementById('depth-val').textContent=this.value">
      <div class="ctrl-row">
        <button class="btn" id="undo-btn" onclick="undoMove()">↩ Undo</button>
        <button class="btn danger" onclick="resetGame()">↺ Reset</button>
      </div>
      <div class="ctrl-row">
        <button class="btn" onclick="exportPGN()">⬇ Export PGN</button>
      </div>
    </div>
  </div>
</div>

<div id="promo-modal">
  <div class="promo-box">
    <p>Promote to</p>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

function makePieceImg(color, type) {
  const img = document.createElement('img');
  img.src = PIECES[color + type.toUpperCase()];
  img.style.cssText = 'width:54px;height:54px;pointer-events:none;display:block;';
  img.draggable = false;
  return img;
}

// Inject king SVGs into color selection screen
document.getElementById('sel-wK').src = PIECES.wK;
document.getElementById('sel-bK').src = PIECES.bK;

// ── App State ─────────────────────────────────────────────────────────────
const API = 'https://chess-engine-tdt0.onrender.com';
let chess = new Chess();
let playerColor = 'w';
let moveHistory = [];
let selected = null;
let legalMoves = [];
let lastMove = null;
let thinking = false;
let undoEnabled = true;

function getDepth() { return parseInt(document.getElementById('depth-slider').value); }

// ── Coords ────────────────────────────────────────────────────────────────
function idxToAlg(idx) {
  if (playerColor === 'w') return String.fromCharCode(97 + idx%8) + (8 - Math.floor(idx/8));
  return String.fromCharCode(97 + 7 - idx%8) + (1 + Math.floor(idx/8));
}
function algToIdx(alg) {
  const col = alg.charCodeAt(0)-97, row = 8-parseInt(alg[1]);
  if (playerColor==='w') return row*8+col;
  return (7-row)*8+(7-col);
}
function algToRowCol(alg) { return {row:8-parseInt(alg[1]),col:alg.charCodeAt(0)-97}; }
function rowColToAlg(r,c) { return String.fromCharCode(97+c)+(8-r); }

// ── Start ─────────────────────────────────────────────────────────────────
function startGame(color) {
  playerColor = color;
  document.getElementById('color-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  buildLabels(); renderBoard();
  if (playerColor==='b') requestAIMove();
}

function buildLabels() {
  const ranks=document.getElementById('rank-labels');
  const files=document.getElementById('file-labels');
  ranks.innerHTML=''; files.innerHTML='';
  const ro=playerColor==='w'?['8','7','6','5','4','3','2','1']:['1','2','3','4','5','6','7','8'];
  const fo=playerColor==='w'?['a','b','c','d','e','f','g','h']:['h','g','f','e','d','c','b','a'];
  ro.forEach(r=>{const s=document.createElement('span');s.textContent=r;ranks.appendChild(s);});
  fo.forEach(f=>{const s=document.createElement('span');s.textContent=f;files.appendChild(s);});
}

// ── Render ────────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  let checkKingAlg = null;
  if (chess.in_check()) {
    const turn = chess.turn();
    for (let r=8;r>=1;r--) for (let c=0;c<8;c++) {
      const a=String.fromCharCode(97+c)+r, p=chess.get(a);
      if (p&&p.type==='k'&&p.color===turn) checkKingAlg=a;
    }
  }

  for (let i=0;i<64;i++) {
    const sq=document.createElement('div');
    const alg=idxToAlg(i);
    const r=Math.floor(i/8),c=i%8;
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    if (lastMove&&(i===lastMove.from||i===lastMove.to)) sq.classList.add('last-move');
    if (i===selected) sq.classList.add('selected');
    if (checkKingAlg&&algToIdx(checkKingAlg)===i) sq.classList.add('in-check');

    if (legalMoves.includes(alg)) {
      const el=document.createElement('div');
      el.className=chess.get(alg)?'legal-capture':'legal-dot';
      sq.appendChild(el);
    }

    const piece=chess.get(alg);
    if (piece) sq.appendChild(makePieceImg(piece.color, piece.type));

    sq.addEventListener('click',()=>onSquareClick(i));
    board.appendChild(sq);
  }
}

// ── Click ─────────────────────────────────────────────────────────────────
function onSquareClick(idx) {
  if (thinking||chess.turn()!==playerColor||chess.game_over()) return;
  const alg=idxToAlg(idx), piece=chess.get(alg);
  if (selected===null) {
    if (piece&&piece.color===playerColor) {
      selected=idx; legalMoves=chess.moves({square:alg,verbose:true}).map(m=>m.to); renderBoard();
    }
  } else {
    if (legalMoves.includes(alg)) {
      const fa=idxToAlg(selected), mp=chess.get(fa);
      const isPromo=mp&&mp.type==='p'&&((playerColor==='w'&&alg[1]==='8')||(playerColor==='b'&&alg[1]==='1'));
      if (isPromo) showPromoModal(playerColor).then(ch=>makePlayerMove(fa,alg,ch));
      else makePlayerMove(fa,alg,null);
    } else if (piece&&piece.color===playerColor) {
      selected=idx; legalMoves=chess.moves({square:alg,verbose:true}).map(m=>m.to); renderBoard();
    } else { selected=null; legalMoves=[]; renderBoard(); }
  }
}

function makePlayerMove(fa,ta,promo) {
  const mo={from:fa,to:ta}; if(promo) mo.promotion=promo.toLowerCase();
  if (!chess.move(mo)) return;
  const f=algToRowCol(fa),t=algToRowCol(ta);
  moveHistory.push({sr:f.row,sc:f.col,er:t.row,ec:t.col,promo:promo||'Q'});
  lastMove={from:algToIdx(fa),to:algToIdx(ta)};
  selected=null; legalMoves=[];
  updateMoveLog(); renderBoard(); setStatus('');
  if (chess.game_over()) { handleGameOver(); return; }
  requestAIMove();
}

// ── AI ────────────────────────────────────────────────────────────────────
async function requestAIMove() {
  thinking=true; setStatus('Thinking','thinking');
  try {
    const res=await fetch(API+'/move',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({moves:moveHistory,depth:getDepth()})});
    const data=await res.json();
    if (data.status==='game_over'){thinking=false;renderBoard();handleGameOver();return;}
    if (data.status==='ok'){
      const m=data.move,fa=rowColToAlg(m.sr,m.sc),ta=rowColToAlg(m.er,m.ec);
      const mo={from:fa,to:ta}; if(m.promo) mo.promotion=m.promo.toLowerCase();
      chess.move(mo);
      moveHistory.push({sr:m.sr,sc:m.sc,er:m.er,ec:m.ec,promo:m.promo||'Q'});
      lastMove={from:algToIdx(fa),to:algToIdx(ta)};
      if (data.eval!==undefined) updateEval(data.eval);
      updateMoveLog(); renderBoard(); setStatus('');
      if (chess.game_over()) handleGameOver();
    }
  } catch(e) { setStatus('Connection error — retrying...','check'); setTimeout(requestAIMove,3000); }
  thinking=false;
}

function updateEval(score) {
  const c=Math.max(-10,Math.min(10,score));
  document.getElementById('eval-fill').style.height=(50+c/10*50)+'%';
  document.getElementById('eval-score').textContent=score>0?'+'+score.toFixed(2):score.toFixed(2);
}

function updateMoveLog() {
  const log=document.getElementById('move-log'),h=chess.history();
  log.innerHTML='';
  for(let i=0;i<h.length;i+=2){
    const row=document.createElement('div'); row.className='log-row';
    row.innerHTML=`<span class="log-num">${Math.floor(i/2)+1}.</span><span class="log-w">${h[i]}</span><span class="log-b">${h[i+1]||''}</span>`;
    log.appendChild(row);
  }
  log.scrollTop=log.scrollHeight;
}

function setStatus(msg,cls) {
  const el=document.getElementById('status'); el.className=cls||'';
  if(cls==='thinking') el.innerHTML='Thinking<span class="thinking-dots"></span>';
  else el.textContent=msg;
}

function handleGameOver() {
  let msg='';
  if(chess.in_checkmate()) msg=chess.turn()===playerColor?'You lose — Checkmate':'You win — Checkmate! 🎉';
  else if(chess.in_stalemate()) msg='Draw — Stalemate';
  else if(chess.in_threefold_repetition()) msg='Draw — Threefold Repetition';
  else if(chess.insufficient_material()) msg='Draw — Insufficient Material';
  else if(chess.in_draw()) msg='Draw — 50-Move Rule';
  setStatus(msg,'gameover');
}

function undoMove() {
  if(!undoEnabled||thinking||moveHistory.length<2) return;
  chess.undo(); chess.undo(); moveHistory.splice(-2);
  lastMove=null; selected=null; legalMoves=[];
  updateMoveLog(); updateEval(0); renderBoard(); setStatus('');
}

function toggleUndo() {
  undoEnabled=!undoEnabled;
  document.getElementById('undo-toggle').classList.toggle('on',undoEnabled);
  document.getElementById('undo-btn').style.opacity=undoEnabled?'1':'0.35';
}

function resetGame() {
  if(thinking) return;
  chess=new Chess(); moveHistory=[];
  selected=null; legalMoves=[]; lastMove=null; thinking=false;
  updateMoveLog(); updateEval(0); renderBoard(); setStatus('');
  if(playerColor==='b') requestAIMove();
}

function exportPGN() {
  const pgn=chess.pgn({max_width:80,newline_char:'\n'});
  const blob=new Blob([pgn],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='game.pgn'; a.click();
  URL.revokeObjectURL(url);
}

function showPromoModal(color) {
  return new Promise(resolve=>{
    const modal=document.getElementById('promo-modal');
    const container=document.getElementById('promo-pieces');
    container.innerHTML='';
    ['Q','R','B','N'].forEach(type=>{
      const div=document.createElement('div'); div.className='promo-piece';
      div.appendChild(makePieceImg(color,type));
      div.onclick=()=>{modal.classList.remove('show');resolve(type);};
      container.appendChild(div);
    });
    modal.classList.add('show');
  });
}
</script>
